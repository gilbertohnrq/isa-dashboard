name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_CRIADORES_DB_ID: ${{ secrets.NOTION_CRIADORES_DB_ID }}
          NOTION_RESUMO_DB_ID: ${{ secrets.NOTION_RESUMO_DB_ID }}
          NOTION_ENTREGAS_DB_ID: ${{ secrets.NOTION_ENTREGAS_DB_ID }}
